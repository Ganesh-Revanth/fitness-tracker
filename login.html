<!DOCTYPE html>
<html>
    <head>
        <title>Log In | Fitness Tracker</title>
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mozilla+Text:wght@200..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">    
    </head>
    
    <body>
        <nav class="navabar">            
            <div class="logo"><a href="index.html"><img src="assets/logo.png" class="logo_img" alt="FT26"></a></div>
            <ul class="nav-links">
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="#">Workouts</a></li>
                <li><a href="#">Records</a></li>
            </ul>
            <div class="btns">
                <input class="btn" type="button" onclick="location.href='login.html';" value="LOG IN" />
                <input class="btn" type="button" onclick="location.href='signup.html';" value="SIGN UP" />
            </div>
            
        </nav>
        <div class="login_cnt">
            <div class="side1">
                <img src="assets/Arnold Conquer.jpg">
                <img src="assets/dominate.png">
            </div>
            <div class="login_form">
                <h2>Welcome Back!</h2>
                <form id="login-form">
                    <div class="input_field">
                        <label>Email:</label><br>
                        <input type="email" id="login-email" placeholder="Enter your email" required>
                    </div>
                    <div class="input_field">
                        <label>Password:</label><br>
                        <input type="password" id="login-password" placeholder="Enter your password" required>
                    </div>
                    <div class="lgn-options">
                        <div class="forgot_pass">
                            <a href="#">Forgot Password?</a>
                        </div>
                        <div class="login-button-cnt">
                            <button class="log_btn" id="login-btn" type="submit">Log In</button>
                        </div> 
                    </div>                 
                </form>
                
                <p class="login_footer">
                    Don't have an account? <a href="signup.html">Sign Up</a>
                </p>
                
            </div>
            <div class="side2">
                <img src="assets/kratos_r.jpg" class="kratos">

            </div>
            
        </div>
        <footer class="footer">
            <div class="footer_content">
                <div class="footer_sec">
                    <h3>Fitness Tracker</h3>
                    <p>Building better verison of ourselves.</p>
                </div>
            </div>
            <div class="footer_bottom">
                &copy; 2026 Fitness Tracker -- Designed & Developed by <a href="https://github.com/Ganesh-Revanth">Ganesh Revanth</a>
            </div>
        </footer>
        <script type="module" src="login.js"></script>
    </body>
</html>
